services:
  - type: web
    name: freebara-app
    env: node
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    disk:
      name: freebara-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: VITE_API_URL
        sync: false